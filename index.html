<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dfkb player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="title">@dfkbirth:~</span>
      <button id="themeToggle" class="theme-toggle">☼</button>
    </div>
    <div class="terminal-body">
      <h1>$ audio</h1>
      <div class="subtitle" id="nowPlaying">▶ Select a track to play</div>
      <div id="playerDisplay" class="player-display hidden">
        <img id="activeCover" class="active-cover" src="" alt="Cover Art">
        <div class="waveform-box">
          <button onclick="closePlayer()" class="close-btn">×</button>
          <div class="wave-wrapper">
            <div id="timeDisplay" class="time-display-floating">00:00 / 00:00</div>
            <div id="waveform"></div>
          </div>
          <div class="controls-bar">
            <button id="pauseBtn" onclick="togglePause()" class="pause-btn">⏸ PAUSE</button>
            <div class="speed-controls">
              <span>SPEED:</span>
              <button onclick="setSpeed(0.75)">0.75x</button>
              <button onclick="setSpeed(1.0)" class="active-speed">1.0x</button>
              <button onclick="setSpeed(1.25)">1.25x</button>
              <button onclick="setSpeed(1.5)">1.5x</button>
            </div>
          </div>
        </div>
      </div>
      <h2>Tracks</h2>
      <div class="audio-grid">
        <button onclick="playTrack(0)"><img class="btn-thumb" src="assets/images/covers/cover1.jpg" alt="c"> Track 01</button>
        <button onclick="playTrack(1)"><img class="btn-thumb" src="assets/images/covers/cover2.jpg" alt="c"> Track 02</button>
        <button onclick="playTrack(2)"><img class="btn-thumb" src="assets/images/covers/cover3.jpg" alt="c"> Track 03</button>
        <button onclick="playTrack(3)"><img class="btn-thumb" src="assets/images/covers/cover4.jpg" alt="c"> Track 04</button>
      </div>
      <br>
      <h2>$ links</h2>
      <div class="links">
        <p><a href="#">[peatron]</a> <a href="#">[soundcloud]</a> <a href="#">[instagram]</a></p>
      </div>
    </div>
    <div class="terminal-footer">$ @dfkb &copy; all rights reserved</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
